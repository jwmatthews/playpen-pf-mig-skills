      description: <Card> must contain CardExpandableContent or CardHeader children
      category: mandatory
      labels:
      - change-type=conformance
      - family=Card
      - package=@patternfly/react-core
      - source=semver-analyzer
      incidents:
      - uri: file:///lightspeed-console/lightspeed-console/src/components/MCPApp.tsx
        message: |-
          <Card> must contain at least one CardExpandableContent or CardHeader child component.

          Correct usage:
            <Card>
              <CardExpandableContent />
            </Card>
        lineNumber: 307
        variables:
          componentName: Card
          module: '@patternfly/react-core'
          parentName: __ComponentReturn__
      effort: 1
    sd-cf-descriptionlist-description-not-in-group-use-term-or-termhelptext:
