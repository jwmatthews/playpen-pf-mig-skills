    sd-prop-to-child-modal-title-to-modalheader:
      description: The `title` prop moved from <Modal> to <ModalHeader>
      category: mandatory
      labels:
      - change-type=prop-to-child
      - family=Modal
      - package=@patternfly/react-core
      - source=semver-analyzer
      - target-component=ModalHeader
      incidents:
      - uri: file:///lightspeed-console/lightspeed-console/src/components/ConfirmationModal.tsx
        message: |-
          The `title` prop has been removed from <Modal>.
          Use <ModalHeader title={...} /> as a child of <Modal> instead.

          Before:
            <Modal title={value}>
              ...
            </Modal>

          After:
            <Modal>
              <ModalHeader title={value} />
              ...
            </Modal>

          IMPORTANT: These props stay on <Modal>: `appendTo`, `backdropClassName`, `disableFocusTrap`, `elementToFocus`, `id`, `isOpen`, `maxWidth`, `onClose`, `onEscapePress`, `ouiaId`.
          Do NOT move them to <ModalHeader>.
        lineNumber: 25
        variables:
          componentName: Modal
          module: '@patternfly/react-core'
          propName: title
          propValue: t('Do you want to leave this page?')
      effort: 3
