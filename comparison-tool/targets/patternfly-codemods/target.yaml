# Generated by migeval bootstrap — review before committing
name: "PatternFly 5 → 6 (codemods)"
framework: patternfly

dependencies:
  expected:
    - name: "@patternfly/patternfly"
      version: "^6"
    - name: "@patternfly/react-core"
      version: "^6"
    - name: "@patternfly/react-icons"
      version: "^6"
    - name: "@patternfly/react-styles"
      version: "^6"
    - name: "@patternfly/react-table"
      version: "^6"
    - name: "@patternfly/react-tokens"
      version: "^6"

text_patterns:
  # ── EmptyState restructuring (PF6 removes EmptyStateHeader, EmptyStateIcon as separate components) ──
  - id: emptystate-header-import
    pattern: "\\bEmptyStateHeader\\b"
    severity: high
    title: "EmptyStateHeader removed in PF6"
    suggestion: "Use EmptyState props (headingLevel, titleText, icon) instead of EmptyStateHeader child component."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: emptystate-icon-component
    pattern: "<EmptyStateIcon\\b"
    severity: high
    title: "EmptyStateIcon is no longer a standalone component in PF6"
    suggestion: "Pass icon directly to EmptyState's icon prop: <EmptyState icon={ExclamationCircleIcon}>."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: emptystate-variant-enum
    pattern: "EmptyStateVariant\\."
    severity: medium
    title: "EmptyStateVariant enum values changed in PF6"
    suggestion: "EmptyStateVariant.full is removed. Use 'lg', 'sm', 'xs', or 'xl' string values."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: title-in-emptystate
    pattern: "<Title[^>]*>.*</Title>"
    severity: medium
    title: "Title inside EmptyState replaced by titleText prop"
    suggestion: "Use the titleText prop on EmptyState instead of a child Title component."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── Modal moved to deprecated ──
  - id: modal-import-react-core
    pattern: "import\\s+\\{[^}]*\\bModal\\b[^}]*\\}\\s+from\\s+['\"]@patternfly/react-core['\"]"
    severity: high
    title: "Modal moved to @patternfly/react-core/deprecated in PF6"
    suggestion: "Import Modal from '@patternfly/react-core/deprecated' or migrate to the new Modal (next) API."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: modal-variant-import
    pattern: "\\bModalVariant\\b"
    severity: medium
    title: "ModalVariant moved to deprecated path"
    suggestion: "Import ModalVariant from '@patternfly/react-core/deprecated' or use new Modal API."
    extensions: [.tsx, .ts, .jsx, .js]
    exclude_on_line: "deprecated"

  # ── Text components renamed to Content ──
  - id: text-content-component
    pattern: "\\bTextContent\\b"
    severity: high
    title: "TextContent renamed to Content in PF6"
    suggestion: "Replace TextContent with Content from @patternfly/react-core."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: text-list-component
    pattern: "\\bTextList\\b"
    severity: high
    title: "TextList removed; use Content with <dl>/<ul>/<ol> children"
    suggestion: "Replace <TextList component='dl'> with <Content component='dl'> or use native HTML inside Content."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: text-list-item-component
    pattern: "\\bTextListItem\\b"
    severity: high
    title: "TextListItem removed; use native HTML inside Content"
    suggestion: "Replace <TextListItem component='dt'> with <dt> inside a Content wrapper."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── React tokens renamed (PF5 global_* → PF6 t_* prefix) ──
  - id: react-tokens-old-global
    pattern: "from\\s+['\"]@patternfly/react-tokens['\"]"
    severity: warning
    title: "PF5 react-tokens may need name updates"
    suggestion: "PF6 tokens use t_ prefix. Check that token names like global_Color_dark_100 are updated to their PF6 equivalents."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: token-global-color-dark
    pattern: "\\bglobal_Color_dark_100\\b"
    severity: medium
    title: "Token global_Color_dark_100 renamed in PF6"
    suggestion: "Replace with the PF6 equivalent design token (e.g., t_global_text_color_regular)."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: token-global-success-color
    pattern: "\\bglobal_success_color_100\\b"
    severity: medium
    title: "Token global_success_color_100 renamed in PF6"
    suggestion: "Replace with PF6 equivalent (e.g., t_global_color_status_success_default)."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: token-global-warning-color
    pattern: "\\bglobal_warning_color_100\\b"
    severity: medium
    title: "Token global_warning_color_100 renamed in PF6"
    suggestion: "Replace with PF6 equivalent (e.g., t_global_color_status_warning_default)."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: token-global-danger-color-100
    pattern: "\\bglobal_danger_color_100\\b"
    severity: medium
    title: "Token global_danger_color_100 renamed in PF6"
    suggestion: "Replace with PF6 equivalent (e.g., t_global_color_status_danger_default)."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: token-global-danger-color-200
    pattern: "\\bglobal_danger_color_200\\b"
    severity: medium
    title: "Token global_danger_color_200 renamed in PF6"
    suggestion: "Replace with PF6 equivalent design token."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── CSS class prefix pf-v5 → pf-v6 ──
  - id: css-class-pf-v5
    pattern: "pf-v5-"
    severity: high
    title: "PF5 CSS class prefix (pf-v5-) must be updated to pf-v6-"
    suggestion: "Run npx @patternfly/class-name-updater --v6 --fix or manually replace pf-v5- with pf-v6-."
    extensions: [.tsx, .ts, .jsx, .js, .css, .scss, .html]

  # ── CSS variables with pf-v5 prefix ──
  - id: css-var-pf-v5
    pattern: "--pf-v5-"
    severity: high
    title: "PF5 CSS variable prefix (--pf-v5-) must be updated"
    suggestion: "Update CSS variables from --pf-v5-* to --pf-v6-* equivalents."
    extensions: [.css, .scss, .tsx, .ts, .jsx, .js]

  # ── PageSection variant="light" removed ──
  - id: pagesection-variant-light
    pattern: "variant=[\"']light[\"']"
    severity: medium
    title: "PageSection variant='light' removed in PF6"
    suggestion: "Use variant='default' or remove variant prop (default is the new default)."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── Deprecated Select imports (should be migrated to new Select) ──
  - id: deprecated-select-import
    pattern: "from\\s+['\"]@patternfly/react-core/deprecated['\"]"
    severity: warning
    title: "Deprecated PF5 component imports"
    suggestion: "Components in /deprecated are removed in a future version. Migrate to the current equivalents."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── EmptyStateFooter should be checked if still valid ──
  - id: emptystate-footer-import
    pattern: "\\bEmptyStateFooter\\b"
    severity: low
    title: "EmptyStateFooter may need restructuring in PF6"
    suggestion: "Verify EmptyStateFooter is still exported or use EmptyState's actions prop."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── EmptyStateActions check ──
  - id: emptystate-actions-import
    pattern: "\\bEmptyStateActions\\b"
    severity: low
    title: "EmptyStateActions restructured in PF6"
    suggestion: "Verify EmptyStateActions usage is compatible with PF6 EmptyState structure."
    extensions: [.tsx, .ts, .jsx, .js]

  # ── PF5 theme dark class ──
  - id: pf-v5-theme-dark-class
    pattern: "pf-v5-theme-dark"
    severity: high
    title: "PF5 dark theme class must be updated"
    suggestion: "Replace 'pf-v5-theme-dark' with 'pf-v6-theme-dark'."
    extensions: [.tsx, .ts, .jsx, .js, .css, .scss]

  # ── Icon wrapping pattern check ──
  - id: icon-component-wrapping
    pattern: "<Icon[\\s>]"
    severity: info
    title: "Icon component usage may need updates"
    suggestion: "In PF6, verify Icon component props haven't changed. Some icon placement moved to dedicated icon props on parent components."
    extensions: [.tsx, .ts, .jsx, .js]

build:
  install_cmd: "npm install --legacy-peer-deps"
  build_cmd: "npm run build"

runtime:
  dev_server_cmd: "npm run start:js"
  port: 3000
  ready_pattern: "Compiled|compiled|webpack|ready|Listening"
  startup_timeout: 120

routes:
  - path: /credentials
    name: credentials
    wait_for: ".pf-v6-c-page__main-section, .pf-c-page__main-section"
  - path: /sources
    name: sources
    wait_for: ".pf-v6-c-page__main-section, .pf-c-page__main-section"
  - path: /scans
    name: scans
    wait_for: ".pf-v6-c-page__main-section, .pf-c-page__main-section"

docs:
  - url: "https://www.patternfly.org/get-started/upgrade/"
    description: "Official PatternFly 5 to 6 upgrade guide"
  - url: "https://www.patternfly.org/get-started/upgrade/release-notes/"
    description: "PatternFly 6 release notes with searchable breaking changes table"
  - url: "https://github.com/patternfly/pf-codemods"
    description: "PatternFly codemods tool (pf-codemods) for automated migration"
  - url: "https://www.patternfly.org/get-started/release-highlights/"
    description: "PatternFly 6 release highlights"
