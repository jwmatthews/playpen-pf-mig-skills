# Generated by migeval bootstrap — review before committing
name: "PatternFly 5 → 6"
framework: patternfly

dependencies:
  expected:
    - name: "@patternfly/react-core"
      version: "^6"
    - name: "@patternfly/patternfly"
      version: "^6"
    - name: "@patternfly/react-icons"
      version: "^6"
    - name: "@patternfly/react-table"
      version: "^6"
    - name: "@patternfly/react-charts"
      version: "^6"

text_patterns:
  # --- CSS prefix changes ---
  - id: pf-v5-css-class-prefix
    pattern: "pf-v5-"
    severity: warning
    title: "PF5 CSS class prefix (pf-v5-)"
    suggestion: "Replace pf-v5- with pf-v6-"
    extensions: [.tsx, .ts, .css, .scss, .jsx, .js]

  - id: pf-v5-css-variable-prefix
    pattern: "--pf-v5-"
    severity: warning
    title: "PF5 CSS variable prefix (--pf-v5-)"
    suggestion: "Replace --pf-v5- with --pf-v6- or use the new design token equivalent"
    extensions: [.tsx, .ts, .css, .scss, .jsx, .js]

  # --- Deprecated / removed component usage ---
  - id: deprecated-import-path
    pattern: "from ['\"]@patternfly/react-core/deprecated['\"]"
    severity: info
    title: "Import from deprecated module"
    suggestion: "Migrate to the replacement components in @patternfly/react-core"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-text-content-component
    pattern: "\\b(TextContent|TextList|TextListItem)\\b"
    severity: warning
    title: "Deprecated Text subcomponents (use Content)"
    suggestion: "Replace TextContent/TextList/TextListItem with the Content component using semantic HTML children"
    extensions: [.tsx, .ts, .jsx, .js]
    exclude_on_line: "import|from"

  - id: old-text-component-jsx
    pattern: "<Text\\b"
    severity: warning
    title: "Deprecated Text component (use Content)"
    suggestion: "Replace <Text> with <Content component='p'> or appropriate semantic element"
    extensions: [.tsx, .jsx]

  - id: old-chip-component
    pattern: "\\bChip(Group)?\\b"
    severity: warning
    title: "Chip/ChipGroup replaced by Label/LabelGroup"
    suggestion: "Replace Chip with Label and ChipGroup with LabelGroup"
    extensions: [.tsx, .ts, .jsx, .js]
    exclude_on_line: "import|from|deprecated|label|Label"

  - id: old-tile-component
    pattern: "\\bTile\\b"
    severity: warning
    title: "Tile replaced by Card"
    suggestion: "Replace Tile with Card component"
    extensions: [.tsx, .ts, .jsx, .js]
    exclude_on_line: "import|from|deprecated"

  - id: old-empty-state-header
    pattern: "\\b(EmptyStateHeader|EmptyStateIcon)\\b"
    severity: warning
    title: "Removed EmptyState subcomponents"
    suggestion: "Use titleText, headingLevel, and icon props directly on EmptyState"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-table-composable
    pattern: "\\bTableComposable\\b"
    severity: warning
    title: "TableComposable renamed to Table"
    suggestion: "Import and use Table directly from @patternfly/react-table"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-kebab-toggle
    pattern: "\\bKebabToggle\\b"
    severity: high
    title: "KebabToggle removed"
    suggestion: "Replace with MenuToggle using variant='plain' and EllipsisVIcon"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-page-header
    pattern: "\\bPageHeader\\b"
    severity: high
    title: "PageHeader removed from @patternfly/react-core"
    suggestion: "Use Masthead component instead"
    extensions: [.tsx, .ts, .jsx, .js]
    exclude_on_line: "react-component-groups"

  - id: old-page-navigation
    pattern: "\\bPageNavigation\\b"
    severity: high
    title: "PageNavigation removed"
    suggestion: "PageNavigation was removed; restructure your page layout"
    extensions: [.tsx, .ts, .jsx, .js]

  # --- Removed/renamed deprecated components ---
  - id: old-application-launcher
    pattern: "\\bApplicationLauncher\\b"
    severity: high
    title: "ApplicationLauncher removed"
    suggestion: "Use Dropdown or Select with MenuToggle instead"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-context-selector
    pattern: "\\bContextSelector\\b"
    severity: high
    title: "ContextSelector removed"
    suggestion: "Use Dropdown or Select with MenuToggle instead"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-options-menu
    pattern: "\\bOptionsMenu\\b"
    severity: high
    title: "OptionsMenu removed"
    suggestion: "Use Dropdown or Select with MenuToggle instead"
    extensions: [.tsx, .ts, .jsx, .js]

  # --- Prop value changes ---
  - id: old-spacer-values
    pattern: "\\bspacer(None|Sm|Md|Lg|Xl|2xl|3xl|4xl)\\b"
    severity: warning
    title: "Old spacer prop values"
    suggestion: "Replace spacer* values with gap-based equivalents: gap, gapSm, gapMd, gapLg, etc."
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-alignment-values
    pattern: "['\"]align(Right|Left)['\"]"
    severity: warning
    title: "Old alignment values"
    suggestion: "Replace alignRight/alignLeft with alignEnd/alignStart"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-global-react-token
    pattern: "\\bglobal_(Color|BackgroundColor|active_color|success_color|warning_color|danger_color|FontSize)_"
    severity: warning
    title: "Old global_* React token (use t_* in PF6)"
    suggestion: "Replace global_* tokens with the new t_* token naming convention"
    extensions: [.tsx, .ts]

  # --- Prop renames ---
  - id: button-isActive-prop
    pattern: "\\bisActive\\b"
    severity: info
    title: "Button isActive prop renamed to isClicked"
    suggestion: "Rename isActive to isClicked on Button components"
    extensions: [.tsx, .jsx]
    exclude_on_line: "import|from|isClicked"

  - id: page-header-prop-rename
    pattern: "\\bheader=\\{"
    severity: info
    title: "Page header prop renamed to masthead"
    suggestion: "Rename the header prop on Page to masthead"
    extensions: [.tsx, .jsx]

  - id: nav-tertiary-variant
    pattern: "['\"]tertiary['\"]"
    severity: warning
    title: "Nav tertiary variant removed"
    suggestion: "Replace variant='tertiary' with variant='horizontal-subnav'"
    extensions: [.tsx, .jsx]

  - id: label-color-cyan
    pattern: "color=['\"]cyan['\"]"
    severity: warning
    title: "Label color 'cyan' renamed to 'teal'"
    suggestion: "Replace color='cyan' with color='teal'"
    extensions: [.tsx, .jsx]

  - id: label-color-gold
    pattern: "color=['\"]gold['\"]"
    severity: warning
    title: "Label color 'gold' renamed to 'yellow'"
    suggestion: "Replace color='gold' with color='yellow'"
    extensions: [.tsx, .jsx]

  - id: toolbar-chip-props
    pattern: "\\b(customChipGroupContent|deleteChipGroup|deleteChip|chipGroupCollapsedText|chipGroupExpandedText)\\b"
    severity: warning
    title: "Toolbar chip-related props renamed to label-based"
    suggestion: "Rename chip* props to label* equivalents (e.g. deleteChip → deleteLabel)"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-charts-import
    pattern: "from ['\"]@patternfly/react-charts['\"]"
    severity: warning
    title: "Charts import path changed"
    suggestion: "Import from '@patternfly/react-charts/victory' instead"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: old-drag-drop
    pattern: "\\bDragDrop\\b"
    severity: warning
    title: "DragDrop deprecated"
    suggestion: "Use DragDropSort from '@patternfly/react-drag-drop'"
    extensions: [.tsx, .ts, .jsx, .js]
    exclude_on_line: "import|from|react-drag-drop"

  - id: masthead-brand-rename
    pattern: "\\bMastheadBrand\\b"
    severity: info
    title: "MastheadBrand renamed to MastheadLogo"
    suggestion: "Use MastheadLogo (MastheadBrand is now a wrapper component)"
    extensions: [.tsx, .ts, .jsx, .js]

  - id: switch-labelOff-removed
    pattern: "\\blabelOff\\b"
    severity: warning
    title: "Switch labelOff prop removed"
    suggestion: "The labelOff prop was removed from Switch"
    extensions: [.tsx, .jsx]

  - id: tabs-isSecondary-rename
    pattern: "\\bisSecondary\\b"
    severity: info
    title: "Tabs isSecondary renamed to isSubtab"
    suggestion: "Rename isSecondary to isSubtab on Tabs"
    extensions: [.tsx, .jsx]

build:
  install_cmd: "npm install --legacy-peer-deps"
  build_cmd: "npm run build"

runtime:
  dev_server_cmd: "npm start"
  port: 3000
  ready_pattern: "Compiled|webpack|ready|Local:"
  startup_timeout: 120

routes:
  - path: /
    name: home
    wait_for: ""
  - path: /login
    name: login

docs:
  - url: "https://www.patternfly.org/get-started/upgrade"
    description: "Official PF6 upgrade guide"
  - url: "https://www.patternfly.org/get-started/upgrade/release-notes/"
    description: "PF6 upgrade release notes (searchable table)"
  - url: "https://github.com/patternfly/pf-codemods"
    description: "PatternFly codemods for automated migration"
  - url: "https://www.patternfly.org/get-started/release-highlights/"
    description: "PF6 release highlights"
